<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sector Uno VR - Próxima Apertura</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&family=Inter:wght@400;500&display=swap');
    
    body {
      margin: 0;
      font-family: 'Inter', sans-serif;
      color: white;
      background: #000000;
      min-height: 100vh;
      text-align: center;
    }
    .container { max-width: 900px; margin: 0 auto; padding: 20px; }
    
    .logo {
      width: 100%;
      max-width: 580px;
      margin: 50px auto 30px;
      filter: drop-shadow(0 0 40px #ff00ff);
    }
    
    .slogan { 
      font-size: 2.4rem; 
      color: #ff00ff; 
      margin: 10px 0 40px; 
      text-shadow: 0 0 20px #ff00ff;
    }
    .tagline {
      font-size: 1.55rem;
      font-style: italic;
      max-width: 720px;
      margin: 0 auto 60px;
      opacity: 0.95;
      color: #00ffff;
    }
    section { margin: 70px 0; }
    h2 { 
      font-size: 2.1rem; 
      margin-bottom: 25px; 
      color: #ff00ff; 
      text-shadow: 0 0 15px #ff00ff;
    }
    .gallery {
      display: flex;
      flex-wrap: wrap;
      gap: 15px;
      justify-content: center;
      margin-top: 30px;
    }
    .gallery img {
      width: 100%;
      max-width: 420px;
      border-radius: 12px;
      box-shadow: 0 0 30px rgba(255, 0, 255, 0.4);
    }
    .btn {
      background: #ff00ff;
      color: white;
      padding: 18px 45px;
      border: none;
      border-radius: 50px;
      font-size: 1.35rem;
      font-weight: bold;
      cursor: pointer;
      margin: 30px 10px;
      transition: 0.3s;
    }
    .btn:hover {
      background: #00ffff;
      color: black;
      transform: scale(1.08);
    }
    .social a {
      font-size: 2.8rem;
      margin: 0 25px;
      color: white;
      text-decoration: none;
    }
  </style>
</head>
<body>
  <div class="container">
    <!-- Logo -->
    <img src="logo.png" alt="Sector Uno VR"
